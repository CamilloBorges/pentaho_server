version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pentaho-postgres
    hostname: repository
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    volumes:
      - pentaho_postgres_data:/var/lib/postgresql/data
      - ./db_init_postgres:/docker-entrypoint-initdb.d:ro
      - ./postgres-config/custom.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      pentaho-net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=256m
      - /var/run/postgresql:size=64m
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    stop_grace_period: 60s

  # Pentaho Server CE
  pentaho-server:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        PENTAHO_VERSION: ${PENTAHO_VERSION:-9.4.0.0-343}
    container_name: pentaho-server
    hostname: pentaho
    environment:
      - PENTAHO_MIN_MEMORY=${PENTAHO_MIN_MEMORY:-2048m}
      - PENTAHO_MAX_MEMORY=${PENTAHO_MAX_MEMORY:-4096m}
      - POSTGRES_HOST=repository
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - PENTAHO_USER=${PENTAHO_USER:-pentaho}
      - PENTAHO_PASSWORD=${PENTAHO_PASSWORD:-password}
    ports:
      - "${PENTAHO_HTTP_PORT:-8080}:8080"
      - "${PENTAHO_HTTPS_PORT:-8443}:8443"
    volumes:
      - pentaho_solutions:/opt/pentaho/pentaho-server/pentaho-solutions
      - pentaho_data:/opt/pentaho/pentaho-server/data
      - ./config/.kettle:/home/pentaho/.kettle
      - ./config/.pentaho:/home/pentaho/.pentaho
    networks:
      pentaho-net:
        ipv4_address: 172.28.0.20
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/pentaho/Login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    tmpfs:
      - /tmp:size=512m
      - /opt/pentaho/pentaho-server/tomcat/temp:size=256m
      - /opt/pentaho/pentaho-server/tomcat/work:size=256m
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: ${PENTAHO_MAX_MEMORY_LIMIT:-6G}
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "5"
    stop_grace_period: 60s

networks:
  pentaho-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pentaho_postgres_data:
    driver: local
  pentaho_solutions:
    driver: local
  pentaho_data:
    driver: local

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
